<!DOCTYPE html>
<html>

<head>
  <title>Uusi kirja-arvostelu</title>
</head>

<body>
  <h1>Uusi kirja-arvostelu</h1>
  <form action="/create_item" method="post">
    <p>
      Kirjan nimi: <br />
      <input type="text" name="book_name" maxlength="50" required />
    </p>
    <p>
      Kirjailija: <br />
      <input type="text" name="writer" maxlength="50" required />
    </p>
    <p>
      Arvostelu: <br />
      <textarea name="review" rows="20" cols="80" maxlength="5000" required ></textarea>
      </p>
    <p>
      Arvosana (1-5): <br />
      <input type="text" name="rating" size="4" pattern="[1-5]{1,5}"/>
      </p>
      {% for class in classes %}
      <p>
        {{ class }}: <br />
        <select name="classes">
          <option value="">(Valitse)</option>
        {% for option in classes[class] %}
          <option value="{{ class }}:{{ option }}">{{ option.capitalize() }}</option>
        {% endfor %}
          </select>
        </p>
        {% endfor %}
    <input type="submit" value="Luo kirja-arvostelu" />
  </form>
</body>

</html>

<!DOCTYPE html>
<html>

<head>
  <title>Käyttäjä {{ user.username }}</title>
</head>

<body>
  <h1>Käyttäjä {{ user.username }}</h1>
  <p>
    Käyttäjällä on yhteensä {{ items | count }} arvostelua.
  </p>
  <h2>Arvostelut</h2>
  <ul>
    {% for item in items %}
    <li><a href="/item/{{ item.id }}">{{ item.book_name }} – {{ item.writer }}</a> </li>
    {% endfor %}
  </ul>
    <a href="/">Takaisin</a>
  </p>
</body>

</html>

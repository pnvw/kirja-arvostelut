<!DOCTYPE html>
<html>

<head>
  <title>Etsi kirja-arvostelu</title>
</head>

<body>
    <h1>Esti kirja-arvostelu</h1>

  <form action="/find_item" method="get">
    <p>
      Hakusana: <input type="text" name="query" value="{{ query }}">
    </p>
    <input type="submit" value="Etsi">
    </form>

    <p>
      <a href="/">Takaisin</a>
    </p>

    {% if query %}
    <h2>Tulokset</h2>

    <ul>
      {% for item in results %}
      <li><a href="/item/{{ item.id }}">{{ item.book_name}} - {{ item.writer }} </a></li>
      {% endfor %}
    </ul>
    {% endif %}
</body>

</html>
